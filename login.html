<head>

  <style>
    :root {
      --primary: #002663;
      --secondary: #dc3545;
      --bg: #f0f2f5;
      --white: #ffffff;
      --text: #1a1a1a;
      --text-light: #65676b;
      --border: #dddfe2;
    }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }
    
    .header { background: var(--white); border-bottom: 1px solid var(--border); padding: 1.5rem; text-align: center; }
    .header-logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); letter-spacing: 1px; }
    
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-card { max-width: 420px; width: 100%; background: var(--white); padding: 2.5rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); border: 1px solid var(--border); }
    .login-card h2 { margin-top: 0; color: var(--primary); font-size: 1.75rem; margin-bottom: 1.5rem; }
    
    .info-box { background: #e7f3ff; padding: 1rem; border-radius: 8px; margin-bottom: 2rem; font-size: 0.9rem; color: #0056b3; line-height: 1.5; border-left: 4px solid #0056b3; }
    
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; color: var(--text-light); }
    .form-group input { width: 100%; padding: 0.85rem; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 1rem; transition: 0.2s; }
    .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,38,99,0.1); }
    
    .btn-login { width: 100%; padding: 1rem; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 1rem; }
    .btn-login:hover { background: #001a4d; }
    
    .login-links { margin-top: 1.5rem; text-align: center; font-size: 0.9rem; }
    .login-links a { color: var(--primary); text-decoration: none; font-weight: 600; }
    
    .footer { text-align: center; padding: 2rem; font-size: 0.85rem; color: var(--text-light); }
  </style>
</head>
<body data-page="login">
  <div id="local-lang-switcher" style="position:fixed;top:0.75rem;right:0.75rem;z-index:2147483647;padding:0.35rem 0.55rem;border:1px solid rgba(0,0,0,.14);border-radius:6px;background:rgba(255,255,255,.94);font-family:Arial,Helvetica,sans-serif;font-size:0.9rem;color:#0e2240;box-shadow:0 10px 24px rgba(0,0,0,.12);">Language: <button type="button" data-lang="en-US" class="lang-button active" style="border:none;background:none;color:#0056b3;cursor:pointer;padding:0 0.15rem;">English</button><span style="color:#8f9bb3;"> | </span><button type="button" data-lang="zh-CN" class="lang-button" style="border:none;background:none;color:#0056b3;cursor:pointer;padding:0 0.15rem;">中文</button></div>

  <header class="header">
    <div class="header-logo">53rd Bank</div>
  </header>

  <main class="main">
    <div class="login-card">
      <h2>Log In</h2>
      
      <div class="info-box" style="background: #f7f7f7; color: #444; border-color: #ddd; font-size: 0.95rem; padding: 0.85rem 1rem; margin-bottom: 1.5rem; border-radius: 8px;">
        <strong>Demo only</strong> — this is a demonstration page and not a real banking login.
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="onlineId">Online ID</label>
          <input type="text" id="onlineId" name="onlineId" placeholder="Enter Online ID" value="WillDonalald1966@gmail.com" required>
        </div>
        <button type="submit" class="btn-login">Next</button>
      </form>

      <div class="login-links">
        <a href="#">Forgot ID/Passcode?</a>
      </div>

      <!-- Two-step welcome modal -->
      <div id="welcomeModal" aria-hidden="true" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); align-items:center; justify-content:center; z-index:9999;">
        <div role="dialog" aria-modal="true" aria-labelledby="modalTitle" style="background:var(--white); padding:2rem; border-radius:12px; max-width:420px; width:100%; box-shadow:0 12px 32px rgba(0,0,0,0.2); margin:auto;">
          <h3 id="modalTitle" style="margin-top:0; color:var(--primary);">Welcome</h3>
          <p id="modalMessage" style="color:var(--text-light); margin-bottom:1rem;">Welcome back</p>
          <div class="form-group">
            <label for="modalPasscode">Passcode</label>
            <input type="password" id="modalPasscode" name="modalPasscode" placeholder="Enter Passcode" required style="width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:8px; box-sizing:border-box;">
          </div>
          <div style="display:flex; gap:0.5rem; margin-top:1rem;">
            <button id="modalSubmit" class="btn-login" style="flex:1;">Sign In</button>
            <button id="modalCancel" class="btn-sm" style="flex:1; background:var(--bg);">Cancel</button>
          </div>
          <div id="modalError" style="color:var(--danger); margin-top:0.75rem; display:none;"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    &copy; 2026 53rd Bank Corporation. All rights reserved. <br>
    Member FDIC. Equal Housing Lender.
  </footer>

      <script>
    (function() {
      var translations = {
        "8ank of america | Online Banking | Log In": "美国银行 | 在线银行 | 登录",
        "Log In": "登录",
        "Security Notice": "安全提示",
        "Please ensure you are using a secure connection. Never share your passcode with anyone.": "请确保您使用的是安全连接。切勿与任何人分享您的密码。",
        "Online ID": "在线 ID",
        "Passcode": "密码",
        "Enter Online ID": "输入在线 ID",
        "Enter Passcode": "输入密码",
        "Forgot ID/Passcode?": "忘记 ID/密码？",
        "8ank of america Corporation. All rights reserved.": "美国银行公司。版权所有。",
        "Member FDIC. Equal Housing Lender.": "FDIC 成员。平等住房贷款人。"
      };
      function getLang() {
        var params = new URLSearchParams(window.location.search);
        return params.get('lang') || sessionStorage.getItem('preferredLang') || 'en-US';
      }
      function setLang(lang) {
        sessionStorage.setItem('preferredLang', lang);
        var params = new URLSearchParams(window.location.search);
        params.set('lang', lang);
        window.location.search = params.toString();
      }
      function translateTextNode(node) {
        if (node.nodeType !== Node.TEXT_NODE) return;
        var value = node.nodeValue.trim();
        if (translations[value]) {
          node.nodeValue = node.nodeValue.replace(value, translations[value]);
        }
      }
      function translateElement(node) {
        if (node.nodeType === Node.TEXT_NODE) {
          translateTextNode(node);
          return;
        }
        if (node.nodeType !== Node.ELEMENT_NODE) return;
        var tag = node.tagName;
        if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'NOSCRIPT') return;
        if (node.hasAttribute('placeholder')) {
          var placeholder = node.getAttribute('placeholder');
          if (translations[placeholder]) node.setAttribute('placeholder', translations[placeholder]);
        }
        for (var i = 0; i < node.childNodes.length; i++) {
          translateElement(node.childNodes[i]);
        }
      }
      function translatePage() {
        var lang = getLang();
        if (lang !== 'zh-CN') return;
        document.documentElement.lang = 'zh-CN';
        document.title = translations[document.title] || document.title;
        translateElement(document.body);
      }
      function updateSwitcher() {
        var container = document.getElementById('local-lang-switcher');
        if (!container) return;
        var current = getLang();
        Array.from(container.querySelectorAll('button')).forEach(function(button) {
          button.classList.toggle('active', button.dataset.lang === current);
          button.style.fontWeight = button.dataset.lang === current ? '700' : '400';
        });
      }

      // Demo credentials
      var DEMO_USERNAME = 'WillDonalald1966@gmail.com';
      var DEMO_PASSWORD = '1Hate2Love@Sea';

      window.addEventListener('DOMContentLoaded', function() {
        var lang = getLang();
        updateSwitcher();
        if (lang === 'zh-CN') translatePage();

        document.getElementById('local-lang-switcher').addEventListener('click', function(e) {
          var btn = e.target.closest('button[data-lang]');
          if (btn) setLang(btn.dataset.lang);
        });

        // Ensure onlineId is set to demo username by default
        var onlineInput = document.getElementById('onlineId');
        if (onlineInput && !onlineInput.value) onlineInput.value = DEMO_USERNAME;

        // Form handling: show modal after entering username
        var loginForm = document.getElementById('loginForm');
        var modal = document.getElementById('welcomeModal');
        var modalMessage = document.getElementById('modalMessage');
        var modalPass = document.getElementById('modalPasscode');
        var modalError = document.getElementById('modalError');
        var modalSubmit = document.getElementById('modalSubmit');
        var modalCancel = document.getElementById('modalCancel');

        function showModal(onlineId) {
          modalMessage.textContent = 'Welcome' + (onlineId ? ', ' + onlineId : '');
          modal.style.display = 'flex';
          modal.setAttribute('aria-hidden', 'false');
          modalError.style.display = 'none';
          modalPass.value = '';
          setTimeout(function() { modalPass.focus(); }, 50);
        }

        function hideModal() {
          modal.style.display = 'none';
          modal.setAttribute('aria-hidden', 'true');
        }

        loginForm.addEventListener('submit', function(e) {
          e.preventDefault();
          var onlineId = document.getElementById('onlineId').value.trim();
          if (!onlineId) return;
          showModal(onlineId);
        });

        modalCancel.addEventListener('click', function() {
          hideModal();
        });

        modalSubmit.addEventListener('click', function() {
          var entered = modalPass.value || '';
          var onlineId = document.getElementById('onlineId').value.trim();
          if (onlineId === DEMO_USERNAME && entered === DEMO_PASSWORD) {
            var lang = getLang();
            window.location.href = 'dashboard.html' + (lang !== 'en-US' ? '?lang=' + lang : '');
          } else {
            modalError.textContent = 'Invalid Online ID or Passcode.';
            modalError.style.display = 'block';
          }
        });

        modalPass.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            modalSubmit.click();
          }
        });
      });
    })();
  </script>
</body>
</html>
